experiment:
  name: tsfm_debug
  debug_mode: true           # prints [DEBUG ONLY] banner; not for scientific conclusions
  pilot_mode: true           # uses 1 target: first role_A_central only
  exploratory: true
  n_per_role: 2
  random_k_repeats: 1
  max_candidates: 10         # structured_10: top-10 nearest by adjacency weight
  candidate_pool_mode: structured_10
  max_scoring_windows: 100   # subsample train windows for extraction + scoring

dataset:
  zip_path: data/raw/METR-LA.zip
  context_length: 144
  horizon: 12
  stride: 12
  max_windows: 9999          # window creation uncapped; subsampling applied separately

extraction:
  model_id: amazon/chronos-2
  layers: [10]

scoring:
  max_lag: 6                 # reduced for debug only (pilot/full use 24)
  dtw_gamma: 1.0
  active_methods: [Pearson, Lagged_CKA]

evaluation:
  top_ks: [5]
  test_frac: 0.2
  max_test_windows: 50       # cap test windows for fast downstream forecasting
