experiment:
  name: synthetic_smoke
  type: synthetic_labeled

dataset:
  type: synthetic_variable_lag
  n_instances: 10
  n_features: 20
  n_relevant: 5
  series_length: 200
  max_lag: 10
  noise_scale: 0.3
  seed: 42

scoring:
  methods:
    - random
    - pearson
    - lagged_pearson
  lagged_pearson:
    max_lag: 15

evaluation:
  type: labeled_ranking
  k_values: [1, 3, 5, 10]

output:
  dir: outputs/synthetic_smoke
